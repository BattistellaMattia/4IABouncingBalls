<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Bouncing Balls</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="start-screen">
    <h1>Bouncing Balls</h1>

    <div class="buttons-container">
      <button id="start-button">START</button>
      <button id="info-button">HELP</button>
    </div>

    <div id="player-name-section">
      <input type="text" id="player-name" placeholder="Enter your name" />
      <button id="clear-name-button">CLEAR</button>
      <button id="save-name-button">SAVE</button>
    </div>

  </div>

  <div class="info" style="display: none;">
    <p>Balls in play: <span id="balls-counter"></span></p>
    <p>Elapsed time: <span id="timer">0</span> seconds</p>
    <p>Last game time: <span id="lastTime">0</span> seconds</p>
    <p>Best game time: <span id="bestTime">0</span> seconds</p>
    
    <h2>Remaining time: <span id="remainingTime">0</span> seconds</h2>

    <button id="next-level" style="display: none;"> Next Level</button>

    <button class="help-button" onclick="window.open('help.html', '_blank')"> HELP</button>

  </div>

  <canvas style="display: none;"></canvas>

  <script src="main.js"></script>
</body>
</html>
